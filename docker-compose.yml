services:
  roulette:
    build: .
    image: roulette:latest
    container_name: roulette
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      DB_PATH: /data/roulette.db
      RUST_LOG: ${RUST_LOG:-info,roulette=info}
      BROUTER_URL: ${BROUTER_URL:-https://brouter.de}
    volumes:
      - roulette_data:/data

volumes:
  roulette_data:
