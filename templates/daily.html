<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Défi du jour · Roulette Vélo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Fraunces:wght@400;600&family=Space+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="daily-page">
  <header class="brand">
    <h1>Défi du jour</h1>
    <p class="tagline">Même parcours pour tous, recalculé chaque nuit.</p>
    <p><a href="/">← retour</a></p>
  </header>
  <main class="grid" id="grid"></main>

  <script>
    const CITIES = ['paris','lyon','marseille','bordeaux','toulouse','nantes','strasbourg','lille','montpellier','rennes'];
    const grid = document.getElementById('grid');

    async function load(city) {
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `<h2>${city}</h2><p class="mono">chargement…</p>`;
      grid.appendChild(card);
      try {
        const r = await fetch(`/api/daily?city=${city}`);
        if (!r.ok) throw new Error(await r.text());
        const d = await r.json();
        const blob = `data:application/gpx+xml;charset=utf-8,${encodeURIComponent(d.gpx)}`;
        card.innerHTML = `
          <h2>${city}</h2>
          <p class="mono">${d.distance_km.toFixed(0)} km · ${d.dplus_m.toFixed(0)} m D+</p>
          <p class="date mono">${d.date}</p>
          <a class="btn ghost" download="${city}-${d.date}.gpx" href="${blob}">GPX</a>
        `;
      } catch (e) {
        card.innerHTML = `<h2>${city}</h2><p class="mono err">indispo</p>`;
      }
    }

    for (const c of CITIES) load(c);
  </script>
</body>
</html>
